plugins {
    id 'java'
    id 'eclipse'
    id 'application'
    id 'org.graalvm.buildtools.native' version '0.11.5'
}

group = 'io.github.seerainer.chess'
version = '0.1.1'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
        vendor = JvmVendorSpec.GRAAL_VM
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://jitpack.io' }
}

ext {
    swtVersion = '3.133.0'
    swtArtifact = 'org.eclipse.swt.'
    os = System.getProperty("os.name").toLowerCase()
    arch = System.getProperty("os.arch")
    normalizedArch = arch
    swtWS = 'unknown'
    swtOS = 'unknown'
}

def detectSwtArtifact() {
    if (os.contains("win")) {
        swtArtifact += 'win32.win32.'
        swtWS = 'win32'
        swtOS = 'win32'
    } else if (os.contains("mac")) {
        swtArtifact += 'cocoa.macosx.'
        swtWS = 'cocoa'
        swtOS = 'macosx'
    } else if (os.contains("linux")) {
        swtArtifact += 'gtk.linux.'
        swtWS = 'gtk'
        swtOS = 'linux'
    } else {
        throw new GradleException("Unsupported OS: ${os}")
    }

    if (arch == 'x86_64' || arch == 'amd64') {
        swtArtifact += 'x86_64'
        normalizedArch = 'x86_64'
    } else if (arch == 'aarch64') {
        swtArtifact += 'aarch64'
        normalizedArch = 'aarch64'
    } else {
        throw new GradleException("Unsupported architecture: ${arch}")
    }

    return "org.eclipse.platform:${swtArtifact}:${swtVersion}"
}

dependencies {
    implementation(detectSwtArtifact()) {
        exclude group: 'org.eclipse.platform', module: 'org.eclipse.swt'
    }
    implementation 'com.github.bhlangonijr:chesslib:1.3.6'

    // GraalVM Polyglot API for Stockfish WASM integration
    implementation 'org.graalvm.polyglot:polyglot:25.0.2'
    implementation 'org.graalvm.polyglot:js:25.0.2'
    implementation 'org.graalvm.polyglot:wasm:25.0.2'

    // Testing dependencies
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'

    // Explicitly declare test runtime engine
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:6.0.3'
}

application {
    mainClass = 'io.github.seerainer.chess.Main'
}

run {
    if (os.contains("mac")) {
        jvmArgs += '-XstartOnFirstThread'
    }
    jvmArgs += '--enable-native-access=ALL-UNNAMED'
}

// Test configuration
test {
    useJUnitPlatform()

    // Increase memory for tests
    minHeapSize = "256m"
    maxHeapSize = "4g"

    // Enable native access for tests
    jvmArgs += '--enable-native-access=ALL-UNNAMED'

    // Test output configuration
    testLogging {
        events = ["passed", "skipped", "failed"]
        exceptionFormat = "full"
        showStandardStreams = false
    }

    // Parallel test execution
    maxParallelForks = Runtime.runtime.availableProcessors()

    // Test timeout
    timeout = Duration.ofMinutes(10)
}

// Source sets for better organization
sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
    test {
        java {
            srcDirs = ['src/test/java']
        }
        resources {
            srcDirs = ['src/test/resources']
        }
    }
}

graalvmNative {
    testSupport = false
    toolchainDetection = false

    binaries {
        main {
            imageName = 'Stockfish.JSWT'
            mainClass = application.mainClass
            buildArgs.add('-march=compatibility')
            buildArgs.add('-Os')
            buildArgs.add('--add-modules=org.graalvm.polyglot')
            buildArgs.add('--initialize-at-build-time=org.eclipse.swt.internal.AutoScaleCalculation$AutoScaleQuarter')
            buildArgs.add('--initialize-at-build-time=org.eclipse.swt.internal.DPIUtil')
            buildArgs.add('--initialize-at-build-time=org.eclipse.swt.internal.DPIUtil$AutoScaleMethod')
            buildArgs.add('--initialize-at-build-time=org.eclipse.swt.internal.DPIUtil$UseSmoothScalingProvider')
            buildArgs.add('--enable-native-access=ALL-UNNAMED')
            buildArgs.add('--enable-native-access=org.graalvm.truffle')
            buildArgs.add('--no-fallback')
            buildArgs.add('-H:+UnlockExperimentalVMOptions')
            buildArgs.add('-H:+VectorAPISupport')
            buildArgs.add('-H:+RemoveUnusedSymbols')
            buildArgs.add('-H:+DeleteLocalSymbols')
            buildArgs.add('-H:+StripDebugInfo')
            buildArgs.add('-H:+TrackPrimitiveValues')
            buildArgs.add('-H:+UsePredicates')
            buildArgs.add('-R:MinHeapSize=256m')
            buildArgs.add('-R:MaxHeapSize=4g')
            buildArgs.add('-R:MaxNewSize=512m')
            useFatJar = false
        }
    }
}

tasks.withType(Jar).configureEach {
    exclude(
        'META-INF/ECLIPSE*',
        'META-INF/maven/**/**/*',
   	    'META-INF/versions/9/*',
        'META-INF/*.txt',
        'about_files/*',
        'version.txt',
        '.api_description',
        'about.html',
        'fragment.properties',
        'libswt*.jnilib',
        'libswt*.so',
        'swt*.dll',
        'WebView2Loader.dll',
        'module-info.class',
        'org/eclipse/swt/awt/*',
        'org/eclipse/swt/opengl/*'
    )
    manifest {
        attributes 'Main-Class': application.mainClass
        attributes 'SWT-WS': swtWS
        attributes 'SWT-OS': swtOS
        attributes 'SWT-Arch': normalizedArch
    }
    from {
        configurations.runtimeClasspath.collect {
            if (it.isDirectory()) {
                it
            } else if ((it.name.endsWith('.jar') || it.name.endsWith('.zip'))
                    && !it.path.contains('org.graalvm')
                    && !it.path.contains('com.oracle')) {
                zipTree(it)
            } else {
                files() // Skip non-archive files and GraalVM jars
            }
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
